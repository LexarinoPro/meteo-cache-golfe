name: Update weather cache

on:
  schedule:
    - cron: '5 * * * *'   # toutes les heures à HH:05 UTC
  workflow_dispatch: {}    # bouton "Run workflow" manuel sur GitHub

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Récupérer la météo
        run: php fetch-weather.php

      - name: Publier si changement
        run: |
          git config user.name "weather-bot"
          git config user.email "actions@github.com"
          git add data/
          git diff --staged --quiet || git commit -m "Mise à jour météo $(date -u +%Y-%m-%dT%H:%MZ)"
          git push
